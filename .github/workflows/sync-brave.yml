name: "2. Maintenance: Sync + Smart Tagging"
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4

      - name: Sparse Checkout Brave
        uses: actions/checkout@v4
        with:
          repository: brave/brave-core
          path: brave-temp
          sparse-checkout: components/brave_shields/core/common/adblock/
          sparse-checkout-cone-mode: true
          fetch-depth: 1 # Just the latest state

      - name: Sync and Tag if Changed
        run: |
          # 1. Prepare directory
          mkdir -p ./adblock-rust-ffi
          rsync -av --delete brave-temp/components/brave_shields/core/common/adblock/ ./adblock-rust-ffi/
          
          # 2. Get the current Brave version/tag name
          # This pulls the 'latest' tag name from the Brave temp folder
          cd brave-temp
          BRAVE_VERSION=$(git describe --tags --abbrev=0 || echo "sync-$(date +%F)")
          cd ..

          # 3. Git config
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 4. Check for changes
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes detected in adblock folder. Skipping commit and tag."
          else
            echo "Changes detected! Tagging with Brave version: $BRAVE_VERSION"
            
            # Commit the changes
            git commit -m "Sync: Updates from Brave $BRAVE_VERSION"
            
            # Create a tag in YOUR repo with the Brave version name
            # We add a suffix like '-brave' to distinguish it from your own releases
            git tag "${BRAVE_VERSION}-ffi"
            
            # Push commit and the specific new tag
            git push origin main
            git push origin "${BRAVE_VERSION}-ffi"
          fi